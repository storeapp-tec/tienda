<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Inventario Institucional Premium</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    :root { --azul-tec: #002F6C; --verde-milenio: #82BC00; --bg: #f8fafc; --surface: #ffffff; --text-main: #0f172a; --text-muted: #64748b; --border: #f1f5f9; --shadow-sm: 0 2px 8px -1px rgba(0,0,0,0.04); }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
    body { background-color: var(--bg); color: var(--text-main); display: flex; justify-content: center; min-height: 100vh; }
    .app-container { background: var(--surface); width: 100%; max-width: 460px; min-height: 100vh; display: flex; flex-direction: column; position: relative; box-shadow: 0 0 40px rgba(0,0,0,0.03); }
    .header { background: linear-gradient(135deg, var(--azul-tec) 70%, var(--verde-milenio) 100%); color: white; padding: 24px 20px 20px 20px; text-align: left; font-size: 22px; font-weight: 700; display: flex; align-items: center; justify-content: space-between; }
    .header-badge { background: rgba(255, 255, 255, 0.15); color: white; font-size: 12px; padding: 6px 12px; border-radius: 20px; font-weight: 600; }
    .navbar { display: flex; background: #f1f5f9; padding: 6px; margin: 16px 16px 8px 16px; border-radius: 14px; gap: 4px; }
    .nav-tab { flex: 1; text-align: center; padding: 10px 0; font-size: 13px; font-weight: 600; color: var(--text-muted); cursor: pointer; border-radius: 10px; }
    .nav-tab.active { background: var(--surface); color: var(--text-main); box-shadow: var(--shadow-sm); }
    .view { display: none; width: 100%; }
    .view.active { display: block; }
    .card { background: var(--surface); border-radius: 20px; padding: 20px; margin-bottom: 16px; border: 1px solid var(--border); box-shadow: var(--shadow-sm); }
    input { width: 100%; padding: 14px 16px; border: 1px solid #e2e8f0; border-radius: 14px; font-size: 15px; background-color: #fafafa; }
    .btn-main { background: linear-gradient(135deg, var(--azul-tec), #001f4d); color: white; border: none; width: 100%; padding: 16px; border-radius: 14px; font-weight: 700; cursor: pointer; }
    #modal-escaner { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background-color: #0b0f19; z-index: 9999; flex-direction: column; padding: 40px 20px; }
    .cam-box { position: relative; width: 90%; max-width: 320px; aspect-ratio: 1; border-radius: 28px; overflow: hidden; align-self: center; background: #000; }
    #lector-camara { width: 100%; height: 100%; }
  </style>
</head>
<body>

<div class="app-container">
  <div class="header">
    <span>Gestión de Almacén</span>
    <span class="header-badge">Premium POS</span>
  </div>
  
  <div class="navbar">
    <div class="nav-tab active" id="tab-inventario" onclick="cambiarPestaña('inventario')">Inventario</div>
    <div class="nav-tab" id="tab-vender" onclick="cambiarPestaña('vender')">Vender</div>
    <div class="nav-tab" id="tab-gestionar" onclick="cambiarPestaña('gestionar')">Gestionar</div>
  </div>

  <div class="content">
    <div id="view-inventario" class="view active">
      <div class="card">
        <input type="text" id="busqueda-inventario" placeholder="Buscar ID o nombre..." oninput="filtrarInventario()">
      </div>
      <div id="lista-inventario-cards"></div>
    </div>

    <div id="view-vender" class="view">
      <div class="card">
        <button class="btn-main" onclick="abrirEscaner('carrito')">📷 ESCANEAR ARTÍCULO</button>
      </div>
      <div id="elementos-carrito"></div>
      <button class="btn-main" style="margin-top:20px; background:var(--verde-milenio);" onclick="procesarCobro()">💵 COBRAR Y DESCONTAR</button>
    </div>

    <div id="view-gestionar" class="view">
      <div class="card">
        <button class="btn-main" onclick="generarReporteMensual()">📊 Generar Reporte Mensual</button>
        <div id="reporte-resultado" style="margin-top:15px; font-size: 14px;"></div>
      </div>
    </div>
  </div>

  <div id="modal-escaner">
    <button onclick="cerrarEscaner()" style="margin-bottom:20px; padding:10px;">CERRAR ESCÁNER</button>
    <div class="cam-box"><div id="lector-camara"></div></div>
  </div>
</div>

<script>
  const URL_API_SHEETS = "https://script.google.com/macros/s/AKfycbxsSsJDbg0KV_CoZI4xCoZjL4JNbOXhI2Cgk8FFXIkU-qg_tdd6NA7XskPW251Kloxx0g/exec";
  let inventarioLocal = [];
  let carrito = [];
  let html5QrcodeScanner = null;

  window.onload = () => {
    fetch(URL_API_SHEETS).then(r => r.json()).then(d => { inventarioLocal = d; renderizarInventario(d); });
  };

  function cambiarPestaña(id) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
    document.getElementById('view-' + id).classList.add('active');
    document.getElementById('tab-' + id).classList.add('active');
  }

  function renderizarInventario(arr) {
    document.getElementById("lista-inventario-cards").innerHTML = arr.map(p => `
      <div class="card">
        <div style="font-weight:700;">${p.descripcion}</div>
        <div style="font-size: 12px; color: var(--text-muted);">ID: ${p.codigo} | Stock: ${p.stock}</div>
      </div>
    `).join('');
  }

  function abrirEscaner(ctx) {
    document.getElementById('modal-escaner').style.display = 'flex';
    html5QrcodeScanner = new Html5QrcodeScanner("lector-camara", { fps: 24, qrbox: 200 });
    html5QrcodeScanner.render(txt => {
      cerrarEscaner();
      if(ctx === 'carrito') agregarAlCarrito(txt);
    });
  }

  function cerrarEscaner() {
    if(html5QrcodeScanner) html5QrcodeScanner.clear().then(() => { document.getElementById('modal-escaner').style.display = 'none'; });
  }

  function agregarAlCarrito(cod) {
    let p = inventarioLocal.find(x => x.codigo === cod);
    if(p) {
      carrito.push({...p, cantidad: 1});
      document.getElementById("elementos-carrito").innerHTML += `<div class="card">${p.descripcion}</div>`;
      alert("Agregado al carrito");
    } else { alert("Producto no encontrado"); }
  }

  function procesarCobro() {
    fetch(URL_API_SHEETS, { method: "POST", mode: "no-cors", body: JSON.stringify({ accion: "cobrar", datos: carrito }) })
      .then(() => { alert("Venta registrada"); carrito = []; document.getElementById("elementos-carrito").innerHTML = ""; });
  }

  function generarReporteMensual() {
    fetch(URL_API_SHEETS + "?accion=generarMensual").then(r => r.json()).then(d => {
      document.getElementById("reporte-resultado").innerText = "Resultado: " + d.url;
    });
  }

  function filtrarInventario() {
    let txt = document.getElementById("busqueda-inventario").value.toLowerCase();
    renderizarInventario(inventarioLocal.filter(p => p.descripcion.toLowerCase().includes(txt) || p.codigo.includes(txt)));
  }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistema Institucional Pro</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    :root { --primary: #002F6C; --secondary: #10b981; --bg: #F8FAFC; --surface: #FFFFFF; --text-main: #0F172A; --text-muted: #64748B; --border: #E2E8F0; }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; }
    body { background-color: var(--bg); color: var(--text-main); }
    .app { max-width: 500px; margin: 0 auto; min-height: 100vh; background: var(--surface); }
    .header { background: var(--primary); color: white; padding: 20px; font-weight: 700; font-size: 1.2rem; }
    .tabs { display: flex; border-bottom: 1px solid var(--border); background: white; }
    .tab { flex: 1; padding: 15px; text-align: center; font-weight: 600; color: var(--text-muted); cursor: pointer; }
    .tab.active { border-bottom: 3px solid var(--primary); color: var(--primary); }
    .view { display: none; padding: 20px; }
    .view.active { display: block; }
    .card { background: white; border: 1px solid var(--border); border-radius: 16px; padding: 16px; margin-bottom: 16px; }
    input { width: 100%; padding: 14px; border: 1px solid var(--border); border-radius: 12px; margin-bottom: 10px; background: #FAFAFA; }
    .item { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid var(--border); }
    .btn { padding: 12px; border-radius: 12px; border: none; font-weight: 600; cursor: pointer; width: 100%; }
    .btn-main { background: var(--primary); color: white; }
    .btn-qty { background: #F1F5F9; width: 35px; height: 35px; border-radius: 8px; }
  </style>
</head>
<body>

<div class="app">
  <div class="header">Gestión Institucional</div>
  <div class="tabs">
    <div class="tab active" onclick="show('inventario', this)">Inventario</div>
    <div class="tab" onclick="show('vender', this)">Vender</div>
    <div class="tab" onclick="show('gestionar', this)">Gestionar</div>
  </div>

  <div id="inventario" class="view active">
    <div class="card">
      <input type="text" id="bus-inv" placeholder="Buscar producto..." oninput="filtrarInv()">
      <div id="ctrl-inv" style="display:none; margin-top:10px;">
        <div id="stock-info" style="font-weight:600; margin-bottom:5px;">Stock Actual: ...</div>
        <input type="number" id="sumar-cant" placeholder="Cantidad a sumar">
        <button class="btn btn-main" onclick="guardarStock()">Actualizar Inventario</button>
      </div>
    </div>
    <div id="lista-inv"></div>
  </div>

  <div id="vender" class="view">
    <div class="card">
      <input type="text" id="bus-ven" placeholder="Escanear código..." onchange="agregarAlCarrito(this.value)">
      <div id="carrito-lista"></div>
      <div style="text-align:right; font-weight:700; margin:10px 0;">Total: <span id="total-monto">$0</span></div>
      <button class="btn btn-main" style="background:var(--secondary);" onclick="cobrar()">COBRAR Y DESCONTAR</button>
    </div>
  </div>

  <div id="gestionar" class="view">
    <div class="card">
      <button class="btn btn-main" onclick="cargarVentas()">Ver Reporte de Ventas</button>
      <div id="ventas-res" style="margin-top:15px;"></div>
    </div>
  </div>
</div>

<script>
  const URL = "https://script.google.com/macros/s/AKfycbxsSsJDbg0KV_CoZI4xCoZjL4JNbOXhI2Cgk8FFXIkU-qg_tdd6NA7XskPW251Kloxx0g/exec";
  let inv = [], cart = [];

  // Carga inicial
  fetch(URL).then(r => r.json()).then(d => { inv = d; renderInv(); });

  function show(id, el) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    if(el) el.classList.add('active');
  }

  function renderInv() {
    document.getElementById("lista-inv").innerHTML = inv.map(p => `
      <div class="item">
        <div style="min-width:0; overflow:hidden;">
          <div style="font-weight:600; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${p.descripcion}</div>
          <div style="font-size:0.8rem; color:#64748B;">Stock: ${p.stock} | $${p.precio}</div>
        </div>
      </div>
    `).join('');
  }

  function filtrarInv() {
    let txt = document.getElementById("bus-inv").value.toLowerCase();
    let p = inv.find(x => x.codigo === txt);
    if(p) {
      document.getElementById("ctrl-inv").style.display = "block";
      document.getElementById("stock-info").innerText = "Stock Actual: " + p.stock;
    }
  }

  function agregarAlCarrito(cod) {
    let p = inv.find(x => x.codigo === cod);
    if(p) {
      cart.push({ ...p, cantidad: 1 });
      renderCarrito();
    }
  }

  function renderCarrito() {
    document.getElementById("carrito-lista").innerHTML = cart.map((item, i) => `
      <div class="item">
        <div>${item.descripcion}</div>
        <div style="display:flex; align-items:center; gap:8px;">
          <button class="btn-qty" onclick="cambiarCant(${i}, -1)">-</button>
          <span style="width:20px; text-align:center;">${item.cantidad}</span>
          <button class="btn-qty" onclick="cambiarCant(${i}, 1)">+</button>
        </div>
      </div>
    `).join('');
    let tot = cart.reduce((s, i) => s + (i.precio * i.cantidad), 0);
    document.getElementById("total-monto").innerText = "$" + tot.toLocaleString();
  }

  function cambiarCant(i, d) {
    cart[i].cantidad = Math.max(1, cart[i].cantidad + d);
    renderCarrito();
  }

  function guardarStock() {
    let cod = document.getElementById("bus-inv").value;
    let cant = document.getElementById("sumar-cant").value;
    fetch(URL, { method: "POST", mode: "no-cors", body: JSON.stringify({ accion: "guardar", datos: {codigo: cod, sumar: cant} }) })
      .then(() => alert("¡Base de datos actualizada!"));
  }

  function cobrar() {
    fetch(URL, { method: "POST", mode: "no-cors", body: JSON.stringify({ accion: "cobrar", datos: cart }) })
      .then(() => { alert("Venta exitosa"); cart = []; renderCarrito(); });
  }

  function cargarVentas() {
    fetch(URL + "?get=ventas").then(r => r.json()).then(d => {
       document.getElementById("ventas-res").innerHTML = d.map(v => `<div>${v.fecha}: $${v.total}</div>`).join('');
    });
  }
</script>
</body>
</html>
